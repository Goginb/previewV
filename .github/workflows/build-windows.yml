name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer and portable
        run: npm run build:dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: previewv-windows-${{ github.ref_name || github.sha }}
          retention-days: 30
          path: |
            release/PreviewV Setup*.exe
            release/PreviewV Setup*.blockmap
            release/PreviewV Portable*.exe
            release/latest.yml
          if-no-files-found: error

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/PreviewV Setup*.exe
            release/PreviewV Setup*.blockmap
            release/PreviewV Portable*.exe
            release/latest.yml
